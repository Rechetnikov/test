<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vue Units</title>
    <style>
        .circle{
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 1px solid black;
            display: inline-block;
        }

        .red {background: red}
        .blue {background: blue}
        .green {background: green}
    </style>
</head>
<body>
    <div id="app">
        <h2>Объект меняет цвет: <div class="circle" :style="{'background': color}"></div></h2>
        <h2>Объект меняет цвет и высоту: <div class="circle" :style="{'background': color, 'height': height+'px'}"></div></h2>
        <h2>Метод меняет цвет и высоту: <div class="circle" :style="circleClasses"></div></h2>
        <h2>Метод + объект меняет цвет и ширину: <div class="circle" :style="[circleClasses, {'width': height+'px'}]"></div></h2>
        <hr />
        <input type="text" v-model="color" />
        <input type="text" v-model="height" />
    </div>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.11"></script>
    <script>
        new Vue({
            el: '#app',
            data: {
                color: 'blue',
                height: '100'
            },
            computed: {
                circleClasses: function () {
                    return {
                        'background': this.color,
                        'height': this.height + 'px'
                    }
                }
            }
        });
    </script>
</body>
</html>
