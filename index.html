<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vue Units</title>
</head>
<body>
    <div id="app">
        Примитивное решение: <input type="text" @input="inputValue = $event.target.value" :value="inputValue" /><hr />
        Продвинутое решение: <input type="text" v-model="inputValue" /><hr />
        При смене фокуса (lazy): <input type="text" v-model.lazy="inputValue" /><hr />
        <h2>Результат: {{inputValue}}</h2>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.11"></script>
    <script>
        new Vue({
            el: '#app',
            data: {
                inputValue: 'init show value'
            }
        });
    </script>
</body>
</html>
