<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vue Units</title>
</head>
<body>
    <div id="app">
        <h2>{{title}} = {{counter}}</h2><hr />
        <button v-on:click="riseCounter(5, 'Добавлено 5', $event, 'blue')">Увеличить на 5</button><hr />
        <button v-on:click="riseCounter(10, 'Добавлено 10', $event, 'green')">Увеличить на 10</button><hr />
    </div>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.11"></script>
    <script>
        new Vue({
            el: '#app',
            data: {
                counter: 0,
                title: 'Счетчик'
            },
            methods: {
                riseCounter: function(num, str, event, color){
                    this.counter += num;
                    this.title = str;
                    event.target.style.color = color
                }
            }
        });
    </script>
</body>
</html>
