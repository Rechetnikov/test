<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vue Units</title>
</head>
<body>
    <div id="app"><hr/>
        <h2>Counter: {{counter}} / Counter2: {{counter2}}</h2>
        <h3>Condition через метод result(): {{result()}} <em>вызывается всегда (и когде не надо тоже)</em></h3>
        <h3>Condition через метод computedResult: {{computedResult}} <em>вызывается только когда переменные учвствуют</em></h3>

        <button @click="add">Add</button>
        <button @click="sub">Sub</button>
        <button @click="counter2++">Add counter2</button>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.11"></script>
    <script>
        new Vue({
            el: '#app',
            data: {
                counter: 0,
                counter2: 0,
            },
            methods: {
                add: function () {
                    this.counter++;
                },
                sub: function () {
                    this.counter--;
                },
                result: function () {
                    console.log("Вызван метод Result");
                    return this.counter>3 ? "Counter больше 3" : "Counter меньше 3";
                },
            },
            computed:{
                computedResult: function () {
                    console.log("Вызван метод computedResult");
                    return this.counter>3 ? "Counter больше 3" : "Counter меньше 3";
                },
            }
        });
    </script>
</body>
</html>
