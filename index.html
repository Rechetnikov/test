<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vue Units</title>
</head>
<body>
    <div id="app">
        <input type="text" v-on:input="changeName" />
        <h1>String: {{ name }}</h1>
        <h1>Sum 10 + 60 : {{10 + 60}}</h1>
        <h1>Number: {{number}}</h1>
        <h1>Function: {{sayHello()}}</h1>
        <h1>If statment {{isOk ? 'I am OK' : 'I am not OK' }}</h1>
        <h1>Functions: {{string.split('').reverse().join('')}}</h1>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.11"></script>
    <script>
        new Vue({
            el: '#app',
            data: {
                name: 'Vue!',
                number: 100,
                isOk: false,
                string: 'My name is Test'
            },
            methods:{
                changeName: function () {
                    this.name = event.target.value
                },
                sayHello: function () {
                    return 'i am function';
                }
            }
        });
    </script>
</body>
</html>
