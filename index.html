<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vue Units</title>
</head>
<body>
    <div id="app">
        <h2><a href="http://google.com" target="_blank">Google (Переход не закрыт)</a></h2><hr />
        <h2><a href="http://google.com" target="_blank" v-on:click="clickOnGoogle">Google (Переход закрыт методом)</a></h2><hr />
        <h2><a href="http://google.com" target="_blank" v-on:click.prevent="">Google (Переход закрыт модификатором)</a></h2><hr />
        <h2 v-on:mousemove = "handleMouseMove">Координаты: X - {{ x }}, Y - {{ y }}. <span v-on:mousemove.stop>Не изменять</span></h2>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.11"></script>
    <script>
        new Vue({
            el: '#app',
            data: {
                x: 0,
                y: 0
            },
            methods: {
                clickOnGoogle: function (event) {
                    event.preventDefault();
                    console.log('preventDefault');
                },
                handleMouseMove: function (event) {
                    this.x = event.clientX;
                    this.y = event.clientY;
                }
            }
        });
    </script>
</body>
</html>
