<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vue Units</title>
</head>
<body>
    <div id="app">
        <h1 v-show="isVisible">I am visible (v-if)</h1>
        <h2 v-show="!isVisible">No I am visible (v-else)</h2>

        <hr />

        <button @click="isVisible = !isVisible">Toggle</button>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.11"></script>
    <script>
        new Vue({
            el: '#app',
            data: {
                isVisible: true,
            }
        });
    </script>
</body>
</html>
