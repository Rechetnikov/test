<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vue Units</title>
</head>
<body>
    <div id="app">
        На JS: <input type="text" v-on:keyup="alertValue" /> <hr />
        На модификаторе Enter <input type="text" v-on:keyup.enter.space="alertModif" />
    </div>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.11"></script>
    <script>
        new Vue({
            el: '#app',
            data: {

            },
            methods: {
                alertValue: function (event) {
                    if(event.keyCode == '13'){
                        console.log(event.target.value);
                    }
                },
                alertModif: function (event){
                    console.log(event.target.value);
                }
            }
        });
    </script>
</body>
</html>
