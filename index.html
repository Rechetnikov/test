<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vue Units</title>
</head>
<body>
    <div id="app">
        <h2><a :href="url">Google</a></h2><hr />  <!-- v-bind -->

        <h2>Counter: {{counter}}</h2> <hr />

        <button @click="counter++">Rise</button> <!-- v-on: -->
    </div>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.11"></script>
    <script>
        new Vue({
            el: '#app',
            data: {
                url: 'http://google.com',
                counter: 0
            }
        });
    </script>
</body>
</html>
