<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vue Units</title>
</head>
<body>
    <div id="app"><hr/>
        <h2>Counter_1: {{counter}} / Counter_2: {{counter2}}</h2>
        <h3>Condition через метод computedResult: {{computedResult}}</h3>

        <button @click="add">Add</button>
        <button @click="sub">Sub</button>
        <button @click="counter2++">Add counter2</button>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.11"></script>
    <script>
        new Vue({
            el: '#app',
            data:{
                counter: 0,
                counter2: 0,
            },
            methods:{
                add: function () {
                    this.counter++;
                },
                sub: function () {
                    this.counter--;
                },
            },
            computed:{
                computedResult: function () {
                    console.log("Вызван метод computedResult");
                    return this.counter>3 ? "Counter больше 3" : "Counter меньше 3";
                },
            },
            watch:{
                counter: function (val) {
                   console.log('Counter изменилвсь на' + val);
                }
            }
        });
    </script>
</body>
</html>
