<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vue Units</title>
</head>
<body>
    <div id="app">
        <h2 ref="heading">{{ title }}</h2>
        <button @click="updateFirstTitle()">Обновление заголовка</button>
        <hr ref="horLine" />
    </div>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.11"></script>
    <script>
        new Vue({
            el: '#app',
            data:{
                title: 'Заголовок по умолчанию',
            },
            methods: {
                updateFirstTitle() {
                    this.title = 'Заголовок изменен';
                    this.$refs.heading.style.color = 'red';
                    console.log(this.$refs);
                }
            }
        });
    </script>
</body>
</html>
