<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vue Units</title>
</head>
<body>
    <div id="app_1">
        <h2>{{ title }}</h2>
        <h3>{{ newField }}</h3>
        <button @click="title = 'Заголовок изменен'">Обновление заголовка</button>
    </div>
    <hr />
    <div id="app_2">
        <h2>{{title}}</h2>
        <button @click="updateFirstTitle">Обновление заголовка в vue_1</button>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.11"></script>
    <script>
        var vue_1 = new Vue({
            el: '#app_1',
            data:{
                title: 'Заголовок по умолчанию',
                newField: ''
            },
            methods: {
                alertConsoleLog: function () {
                    console.log('run alertConsoleLog')
                }
            }
        });

        vue_1.newField = 'Новое поле';

        new Vue({
            el: '#app_2',
            data:{
                title: 'Привет из vue 2'
            },
            methods:{
                updateFirstTitle: function () {
                    console.log('updateFirstTitle');
                    vue_1.title = "Обновление из второго Vue";
                    vue_1.newField = 'Новое значение поля vue_1.newField из vue_2';
                    vue_1.alertConsoleLog();
        }
            }
        });
    </script>
</body>
</html>
