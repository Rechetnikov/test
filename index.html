<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vue Units</title>
</head>
<body>
    <div id="app_mount">
        <h2>{{ title }}</h2>
    </div>

    <div id="app_template"></div>

    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.11"></script>
    <script>
        var vue_mount = new Vue({
            data:{
                title: 'Заголовок "mount" по умолчанию',
            }
        });
        vue_mount.$mount('#app_mount');

        var vue_template = new Vue({
            el: '#app_template',
            data:{
                title: 'Заголовок "template" по умолчанию'
            },
            template: '<h2>{{title}}</h2>'
        });
    </script>
</body>
</html>
