<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vue Units</title>
    <style>
        .circle{
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 1px solid black;
            display: inline-block;
        }

        .red {background: red}
        .blue {background: blue}
        .green {background: green}
    </style>
</head>
<body>
    <div id="app">
        <h2>Объект: <div class="circle" @click="isActive = !isActive" :class="{'red': isActive, 'green': !isActive}"></div></h2>
        <h2>Метод: <div class="circle" @click="isActive = !isActive" :class="getCssClassec()"></div></h2>
        <h2>Метод computed: <div class="circle" @click="isActive = !isActive" :class="getCssClassecComputed"></div></h2>
        <hr />
        <h2>Компонент: <div class="circle" :class="color"></div></h2>
        <h2>Компонент как массив + объект: <div class="circle" :class="[color, {'red': isActive}]"></div></h2>
        <h2>Компонент как массив + метод computed: <div class="circle" :class="[color, getCssClassecComputed]"></div></h2>
        <hr />
        <input type="text" v-model="color" />
    </div>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.11"></script>
    <script>
        new Vue({
            el: '#app',
            data: {
                isActive: false,
                color: 'blue'
            },
            computed:{
                getCssClassecComputed: function() {
                    return {
                        'red': this.isActive,
                        'blue': !this.isActive
                    }
                }
            },
            methods:{
                getCssClassec: function() {
                    return {
                        'red': this.isActive,
                        'green': !this.isActive
                    }
                }
            }
        });
    </script>
</body>
</html>
