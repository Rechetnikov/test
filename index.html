<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vue Units</title>
</head>
<body>
    <div id="app">
        <h2>{{ title }}</h2>
        <button @click="title = 'Заголовок изменен'">Обновление заголовка</button>
        <button @click="doDestroy">Destroy</button>
    </div>



    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.11"></script>
    <script>
        var vue_mount = new Vue({
            el: '#app',
            data:{
                title: 'Заголовок по умолчанию',
            },
            methods: {
                doDestroy: function() {
                    this.$destroy()
                }
            },
            beforeCreate: function() {
                console.log('Before Create | Начало создания');
            },
            created: function() {
                console.log('Created | Vue создан но нет html');
            },
            beforeMount: function() {
                console.log('Before Mount | Начало создания html');
            },
            mounted: function() {
                console.log('Mounted | Html создан');
            },
            beforeUpdate: function() {
                console.log('Before Update | Начало обновления');
            },
            updated: function() {
                console.log('Updated | Обновлено')
            },
            beforeDestroy: function() {
                console.log('Before Destroy | Начало удаления')
            },
            destroyed: function() {
                console.log('Destroyed | Удалено')
            }
        });
    </script>
</body>
</html>
